<div class="header">
  <!-- <button class="btn btn-secondary" (click)="goBack()">Retour</button> -->
  <span class="title">Relations - {{ focusedTable || 'Toutes tables' }}</span>
  <div class="controls">
    <button class="btn" (click)="zoomIn()">➕</button>
    <button class="btn" (click)="zoomOut()">➖</button>
    <button class="btn" (click)="fit()">🔍 Fit</button>
  </div>
</div>

<div #chartContainer class="chart-container" id="graph-container">
  <!-- SVG injecté par D3 -->
</div>

<div class="legend">
  <span class="legend-item"><b>●</b> Table</span>
  <span class="legend-item fk">{{utils.tr('app.compo.utils.relations.fkPk')}}</span>
</div>

<!-- tooltip -->
<div #tooltip class="tooltip" [style.display]="tooltipVisible ? 'block' : 'none'"></div>
