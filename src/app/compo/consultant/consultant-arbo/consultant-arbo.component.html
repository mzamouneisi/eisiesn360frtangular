<div class="consultant-tree" *ngIf="consultant">
  <div class="consultant-node">
    <button type="button" class="consultant-card" (click)="selectConsultant(consultant)">
      <span class="consultant-avatar">{{ (consultant.fullName || consultant.username || '?') | slice:0:1 | uppercase }}</span>
      <span class="consultant-body">
        <span class="consultant-name">{{ getLabel(consultant) }}</span>
        <span class="consultant-meta">{{ consultant.role }}<span *ngIf="consultant.username"> · {{ consultant.username }}</span></span>
      </span>
      <span class="consultant-count" *ngIf="hasChildren(consultant)">{{ consultant.listConsultant.length }}</span>
    </button>

    <div class="consultant-children" *ngIf="consultant.listConsultant?.length">
      <div class="consultant-children-line"></div>
      <div class="consultant-children-list">
        <app-consultant-arbo
          *ngFor="let child of consultant.listConsultant"
          [consultant]="child"
          [manager]="consultant"
          (consultantSelected)="consultantSelected.emit($event)">
        </app-consultant-arbo>
      </div>
    </div>
  </div>
</div>
