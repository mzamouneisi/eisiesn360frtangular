<div class="consultant-tree" *ngIf="consultant">
  <div class="tree-actions" *ngIf="canShowActionBar() && hasPendingChanges()">
    <button type="button" class="btn-cancel" (click)="cancelPendingChanges()" [disabled]="dragDropState?.saving">Annuler</button>
    <button type="button" class="btn-save" (click)="savePendingChanges()" [disabled]="dragDropState?.saving">
      {{ dragDropState?.saving ? utils.tr('app.common.loading') : 'Enregistrer' }}
    </button>
  </div>

  <div class="consultant-node">
    <button
      type="button"
      class="consultant-card"
      [class.drag-source]="dragDropState?.draggedConsultantId === consultant.id"
      [class.drop-target]="isDropTarget(consultant)"
      [class.drag-over]="isDragOver(consultant)"
      [attr.draggable]="isDraggable(consultant)"
      (dragstart)="onDragStart($event, consultant)"
      (dragend)="onDragEnd()"
      (dragover)="onDragOver($event, consultant)"
      (dragleave)="onDragLeave(consultant)"
      (drop)="onDrop($event, consultant)"
      (click)="selectConsultant(consultant)">
      <img *ngIf="consultantService.getPhotoUrl(consultant); else consultantInitial" class="consultant-avatar-img" [src]="consultantService.getPhotoUrl(consultant)" alt="consultant photo" />
      <ng-template #consultantInitial>
        <span class="consultant-avatar">{{ consultantService.getInitial(consultant) }}</span>
      </ng-template>
      <span class="consultant-body">
        <span class="consultant-name">{{ getLabel(consultant) }}</span>
        <span class="consultant-meta">{{ consultant.role }}<span *ngIf="consultant.username"> · {{ consultant.username }}</span></span>
      </span>
      <span class="consultant-count" *ngIf="hasChildren(consultant)">{{ consultant.listConsultant.length }}</span>
    </button>

    <div class="consultant-children" *ngIf="consultant.listConsultant?.length">
      <div class="consultant-children-line"></div>
      <div class="consultant-children-list">
        <app-consultant-arbo
          *ngFor="let child of consultant.listConsultant"
          [consultant]="child"
          [manager]="consultant"
          [dragDropState]="dragDropState"
          (consultantSelected)="consultantSelected.emit($event)">
        </app-consultant-arbo>
      </div>
    </div>
  </div>
</div>
